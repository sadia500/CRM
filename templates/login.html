<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f4f5f7;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:#fff;border:1px solid #e1e4e8;border-radius:8px;padding:40px;width:380px;box-shadow:0 4px 16px rgba(9,30,66,0.1);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-icon{width:36px;height:36px;background:#0052cc;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
.logo-text{font-size:16px;font-weight:700;color:#172b4d;}
h2{font-size:20px;font-weight:700;color:#172b4d;margin-bottom:6px;}
p{font-size:13px;color:#5e6c84;margin-bottom:24px;}
label{display:block;font-size:11px;font-weight:600;color:#5e6c84;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
select{width:100%;padding:10px 12px;border:2px solid #e1e4e8;border-radius:4px;font-size:14px;font-family:'Inter',sans-serif;color:#172b4d;outline:none;margin-bottom:20px;background:#fff;}
select:focus{border-color:#0052cc;}
button{width:100%;padding:11px;background:#0052cc;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
button:hover{background:#0041a8;}
.note{font-size:11px;color:#97a0af;text-align:center;margin-top:16px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">CRM</div>
    <div class="logo-text">CRM System</div>
  </div>
  <h2>Welcome back</h2>
  <p>Select your profile to continue</p>
  {% if error %}
<div style="background:#ffebe6;border:1px solid #ff8b00;color:#de350b;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;">
  ⚠ {{ error }}
</div>
{% endif %}
  <form method="POST">
    <label>Select Your Name</label>
    <label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required style="width:100%;padding:10px 12px;border:2px solid #e1e4e8;border-radius:4px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;">
    <select name="emp_id" required>
      <option value="">— Choose your name —</option>
      {% for e in employees %}
      <option value="{{ e.employee_id }}">{{ e.first_name }} {{ e.last_name }} — {{ e.role.replace('_',' ').title() }}</option>
      {% endfor %}
    </select>
    <button type="submit">Enter CRM →</button>
  </form>
  <div class="note">CRM Database Management System</div>
</div>
</body>
</html>
